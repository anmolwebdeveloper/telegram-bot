<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmosh's Algobot 🚀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: fadeIn 1s ease-in-out;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #ccc;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .feature-badge {
            background: rgba(0, 198, 255, 0.2);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #00c6ff;
        }
        
        /* Chat UI Styles */
        .chat-box {
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(0, 198, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-history {
            height: 250px;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .msg-bot {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            align-self: flex-start;
            border-bottom-left-radius: 0;
            color: white;
        }
        /* Style algorithm outputs to look like code blocks! */
        .msg-bot code {
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 2px 4px;
            border-radius: 4px;
            display: block;
        }
        .msg-user {
            background: rgba(255, 255, 255, 0.2);
            align-self: flex-end;
            border-bottom-right-radius: 0;
            color: white;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(0, 198, 255, 0.3);
        }
        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
        }
        button {
            background: #00c6ff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #0072ff;
        }
        
        .telegram-link {
            margin-top: 20px;
            color: #00c6ff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .telegram-link:hover {
            text-decoration: underline;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #00c6ff; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anmosh's Algobot 🚀</h1>
        <p>Your personal DSA companion.</p>
        <div class="features">
            <span class="feature-badge">Searching</span>
            <span class="feature-badge">Sorting</span>
            <span class="feature-badge">Math & Strings</span>
        </div>
    </div>

    <!-- Web Chat Interface -->
    <div class="chat-box">
        <div class="chat-history" id="chatHistory">
            <div class="message msg-bot">Hello! 👋 I am Anmosh's Algobot. You can chat with me directly here in your browser!<br><br>Try typing "hi", "help", or ask for an algorithm like "binarysearch" or "bubblesort".</div>
        </div>
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="userInput" placeholder="Ask me something or type an algorithm..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <a href="https://web.telegram.org/a/#?tgaddr=tg%3A%2F%2Fresolve%3Fdomain%3Danmbot" target="_blank" class="telegram-link">Chat on Telegram Web 💬</a>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatHistory = document.getElementById('chatHistory');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'msg-user' : 'msg-bot'}`;
            // If it seems to be code, let's wrap it in a code tag!
            if (sender === 'bot' && text.includes('function') || text.includes('Here is your code:')) {
                div.innerHTML = `<code>${text}</code>`;
            } else {
                div.innerText = text;
            }
            chatHistory.appendChild(div);
            // Scroll to bottom dynamically
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value;
            if (!message.trim()) return;

            appendMessage(message, 'user');
            userInput.value = '';

            try {
                // Send the message to our new Vercel Web API endpoint
                const res = await fetch('/api/webchat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                appendMessage(data.reply, 'bot');
            } catch (err) {
                appendMessage("Oops! My servers couldn't process that right now. 😢", 'bot');
            }
        });
    </script>
</body>
</html>
